[flake8]
max-line-length = 120
exclude = .git,__pycache__,docs,old,build,dist

[isort]
profile = black
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True
line_length = 120

[mypy]
ignore_missing_imports = True

[coverage:run]
omit =
    */tests/*
    */docs/*

[coverage:report]
fail_under = 70
show_missing = True
